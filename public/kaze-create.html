<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaze — Create</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #F5EAE0;
  --bg1:      #EDE0D4;
  --surface:  #FDFAF8;
  --line:     rgba(160,110,70,0.13);
  --lm:       rgba(160,110,70,0.22);
  --t1:       #3A1F0D;
  --t2:       #8B6347;
  --t3:       #BFA08A;
  --accent:   #E8724A;
  --accent-h: #D95E36;
  --logo:     #5C2E0E;
  --purple:   #7C4DFF;
  --r:        10px;
}
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--t1);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
button { font-family: inherit; cursor: pointer; }

/* ══════════════════ NAV ══════════════════ */
nav {
  height: 58px; flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  position: relative; z-index: 10;
}
.logo {
  font-family: 'Inter', sans-serif;
  font-size: 24px; font-weight: 700; letter-spacing: -0.03em;
  color: var(--logo); text-decoration: none;
  margin-right: 36px; flex-shrink: 0;
}
.nl { display: flex; gap: 0; flex: 1; align-items: center; }
.nl a {
  padding: 5px 13px; font-size: 13.5px; font-weight: 400;
  color: var(--t2); text-decoration: none; border-radius: var(--r);
  transition: color 0.15s, background 0.15s; position: relative;
}
.nl a:hover { color: var(--t1); }
.nl a.on { color: var(--accent); font-weight: 500; }
.nl a.on::after {
  content: ''; position: absolute; bottom: -1px; left: 13px; right: 13px;
  height: 2px; background: var(--accent); border-radius: 1px;
}
.nr { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.nav-icon {
  width: 34px; height: 34px; border-radius: var(--r);
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--t2); transition: all 0.15s;
}
.nav-icon:hover { background: var(--bg1); color: var(--t1); }
.nav-icon svg { width: 16px; height: 16px; }
.nav-assets {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 13px; font-size: 12.5px; font-weight: 400;
  color: var(--t2); border: 1px solid var(--lm); border-radius: var(--r);
  background: none; text-decoration: none; transition: all 0.15s;
}
.nav-assets:hover { background: var(--bg1); color: var(--t1); }
.nav-assets svg { width: 13px; height: 13px; }
.plan-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; font-size: 12.5px; font-weight: 500;
  background: var(--accent); color: #fff;
  border: none; border-radius: 20px;
  transition: background 0.15s;
}
.plan-btn:hover { background: var(--accent-h); }
.plan-avatar {
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
}

/* ══════════════════ LAYOUT ══════════════════ */
.app-body {
  flex: 1; display: flex; overflow: hidden;
}

/* ══════════════════ LEFT SIDEBAR ══════════════════ */
.sidebar-left {
  width: 68px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 12px 0 16px;
  gap: 2px;
  overflow-y: auto;
  -ms-overflow-style: none; scrollbar-width: none;
}
.sidebar-left::-webkit-scrollbar { display: none; }

.sl-item {
  width: 46px; height: 44px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; border-radius: var(--r);
  cursor: pointer; border: none; background: none;
  color: var(--t3); transition: all 0.15s; flex-shrink: 0;
}
.sl-item:hover { background: var(--bg1); color: var(--t2); }
.sl-item.active { background: rgba(232,114,74,0.1); color: var(--accent); }
.sl-item svg { width: 17px; height: 17px; }
.sl-item span { font-size: 9px; font-weight: 500; }

.sl-divider { width: 36px; height: 1px; background: var(--line); margin: 5px 0; flex-shrink: 0; }

.thumb {
  width: 44px; height: 44px; border-radius: 8px;
  overflow: hidden; cursor: pointer; flex-shrink: 0;
  border: 1.5px solid transparent;
  transition: border-color 0.15s, transform 0.15s;
}
.thumb:hover { border-color: var(--accent); transform: scale(1.05); }
.thumb.active { border-color: var(--accent); }
.thumb div { width: 100%; height: 100%; display: block; }
.t1b { background: linear-gradient(145deg,#C07848,#E0A878); }
.t2b { background: linear-gradient(145deg,#2860A0,#5890C8); }
.t3b { background: linear-gradient(145deg,#A06080,#D090A8); }
.t4b { background: linear-gradient(145deg,#806030,#C09060); }
.t5b { background: linear-gradient(145deg,#304858,#608098); }
.t6b { background: linear-gradient(145deg,#E8E0D0,#C8B8A0); }
.t7b { background: linear-gradient(145deg,#406878,#70A8B8); }
.t8b { background: linear-gradient(145deg,#181818,#484848); }
.t9b { background: linear-gradient(145deg,#204828,#508060); }

/* ══════════════════ MAIN CANVAS ══════════════════ */
.main-canvas {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* 消息滚动区 */
.chat-feed {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  -ms-overflow-style: none; scrollbar-width: none;
}
.chat-feed::-webkit-scrollbar { display: none; }

/* 空状态居中显示原来的 hero */
.chat-empty {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding-bottom: 40px;
}

/* 消息气泡 */
.msg {
  display: flex; gap: 12px; align-items: flex-start;
  max-width: 680px;
}
.msg.user {
  flex-direction: row-reverse;
  align-self: flex-end;
}
.msg.ai { align-self: flex-start; }
.msg-avatar {
  width: 30px; height: 30px; border-radius: 8px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600;
}
.msg.ai .msg-avatar {
  background: rgba(232,114,74,0.12); color: var(--accent);
}
.msg.user .msg-avatar {
  background: var(--t1); color: #fff; font-size: 11px;
}
.msg-bubble {
  padding: 11px 15px;
  font-size: 14px; line-height: 1.65; font-weight: 300;
  border-radius: 14px;
}
.msg.ai .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--t1);
  border-top-left-radius: 4px;
}
.msg.user .msg-bubble {
  background: var(--accent);
  color: #fff;
  border-top-right-radius: 4px;
}

/* typing */
.chat-typing {
  display: none; align-items: center; gap: 8px;
  padding: 4px 40px 8px;
  font-size: 12px; color: var(--t3);
}
.chat-typing.show { display: flex; }
.typing-dots { display: flex; gap: 4px; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--t3); animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* 输入框停靠在底部 */
.input-dock {
  flex-shrink: 0;
  padding: 0 40px 24px;
  background: var(--bg);
}

/* input panel */
.input-panel {
  width: 100%;
  background: var(--surface);
  border: 1px solid rgba(160,110,70,0.15);
  border-radius: 14px;
  box-shadow: 0 2px 16px rgba(160,110,70,0.08);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.input-panel:focus-within { box-shadow: 0 4px 28px rgba(160,110,70,0.14); }

/* preview */
.preview-row {
  display: flex; gap: 12px; align-items: flex-end;
  margin-bottom: 24px; position: relative;
}
.preview-sparkle {
  position: absolute; left: -20px; top: 50px;
  color: var(--accent); font-size: 18px; opacity: 0.6; pointer-events: none;
}
.prev-img { border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(60,20,0,0.15); flex-shrink: 0; }
.pi1 { width: 120px; height: 158px; }
.pi2 { width: 120px; height: 158px; transform: rotate(-1deg); }
.pi3 { width: 120px; height: 158px; transform: rotate(1deg); }
.pi4 { width: 120px; height: 158px; transform: rotate(-1.5deg); }
.pv1{background:linear-gradient(145deg,#101010,#303030);}
.pv2{background:linear-gradient(145deg,#3A1808,#C07040);}
.pv3{background:linear-gradient(145deg,#083838,#20A080);}
.pv4{background:linear-gradient(145deg,#300828,#A03080);}

/* page title */
.page-title {
  font-family: 'DM Serif Display', serif;
  font-size: 30px; font-weight: 400; color: var(--t1); letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.page-title .star { color: var(--accent); font-size: 18px; }
.page-sub { font-size: 13px; color: var(--t2); font-weight: 300; margin-bottom: 18px; }

/* mode pills */
.mode-pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.mode-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 15px; font-size: 13px; font-weight: 400;
  color: var(--t2); background: var(--surface);
  border: 1px solid var(--lm); border-radius: 20px; transition: all 0.15s;
}
.mode-pill:hover { border-color: var(--accent); color: var(--accent); }
.mode-pill.on { background: rgba(232,114,74,0.08); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.mode-pill svg { width: 14px; height: 14px; }
.mode-pill .emoji { font-size: 14px; }
.itabs {
  display: flex; border-bottom: 1px solid var(--line);
  padding: 0 6px;
}
.itab {
  display: flex; align-items: center; gap: 6px;
  padding: 11px 15px 13px;
  font-size: 13px; font-weight: 400; color: var(--t3);
  cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  font-family: inherit; transition: color 0.15s; white-space: nowrap;
}
.itab:hover { color: var(--t2); }
.itab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.itab svg { width: 14px; height: 14px; }
.ibody { display: flex; gap: 12px; padding: 14px 18px 10px; }
.refbtn {
  flex-shrink: 0; width: 42px; height: 42px; margin-top: 2px;
  border-radius: var(--r); background: rgba(160,110,70,0.06);
  border: 1.5px dashed var(--lm); color: var(--t3);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: all 0.15s;
}
.refbtn:hover { border-color: var(--accent); color: var(--accent); }
textarea {
  flex: 1; border: none; outline: none; background: transparent; resize: none;
  font-family: inherit; font-size: 14px; font-weight: 300;
  color: var(--t1); min-height: 60px; line-height: 1.65;
}
textarea::placeholder { color: var(--t3); font-weight: 300; }
.ifoot {
  display: flex; align-items: center;
  padding: 8px 18px 14px; gap: 6px;
  border-top: 1px solid var(--line);
}
.chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; font-size: 12px; font-weight: 400; color: var(--t2);
  background: none; border: none; border-radius: var(--r);
  transition: all 0.15s; white-space: nowrap;
}
.chip:hover { color: var(--t1); background: rgba(160,110,70,0.07); }
.chip svg { width: 12px; height: 12px; opacity: 0.7; }
.sep { width: 1px; height: 14px; background: var(--line); }
.fright { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.gallery-chip {
  display: flex; flex-direction: column; align-items: center;
  position: relative;
}
.gallery-new {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 600; background: var(--accent); color: #fff;
  padding: 1px 5px; border-radius: 4px; white-space: nowrap;
}
.gallery-label {
  padding: 5px 11px; font-size: 12px; color: var(--t2); font-weight: 400;
  background: none; border: none; transition: color 0.15s; margin-top: 6px;
}
.gallery-label:hover { color: var(--t1); }
.cnt { font-size: 13px; color: var(--t2); }
.go {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--accent); border: none;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(232,114,74,0.4);
  transition: all 0.2s;
}
.go:hover { background: var(--accent-h); transform: scale(1.07); box-shadow: 0 4px 18px rgba(232,114,74,0.5); }
.go svg { width: 16px; height: 16px; }

/* ══════════════════ RIGHT PANEL ══════════════════ */
.sidebar-right {
  width: 48px; flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
}
.sidebar-right.open { width: 320px; }

/* collapsed icon strip */
.rp-strip {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  padding: 12px 0; flex-shrink: 0;
}
.rp-strip-btn {
  width: 36px; height: 36px; border-radius: var(--r);
  background: none; border: none; color: var(--t3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.rp-strip-btn:hover { background: var(--bg1); color: var(--t2); }
.rp-strip-btn.active { color: var(--accent); background: rgba(232,114,74,0.1); }
.rp-strip-btn svg { width: 17px; height: 17px; }
.rp-strip-divider { width: 28px; height: 1px; background: var(--line); margin: 2px 0; }
/* hide strip when open */
.sidebar-right.open .rp-strip { display: none; }

/* panel content hidden when collapsed */
.rp-panel {
  display: none; flex-direction: column; flex: 1; overflow: hidden;
}
.sidebar-right.open .rp-panel { display: flex; }

/* drag handle */
.rp-drag-handle {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  cursor: col-resize;
  z-index: 10;
  transition: background 0.15s;
}
.sidebar-right.open .rp-drag-handle:hover { background: rgba(232,114,74,0.3); }
.sidebar-right { position: relative; }
.rp-header {
  padding: 18px 20px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.rp-header h2 { font-size: 17px; font-weight: 600; color: var(--t1); }
.rp-close {
  width: 28px; height: 28px; border-radius: 6px;
  background: none; border: none; color: var(--t3);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; line-height: 1; transition: all 0.15s;
}
.rp-close:hover { color: var(--t2); background: var(--bg1); }

/* gallery tabs */
.rp-tabs {
  display: flex; padding: 12px 20px 0; gap: 0;
  border-bottom: 1px solid var(--line); flex-shrink: 0;
}
.rp-tab {
  padding: 6px 12px 10px; font-size: 13px; font-weight: 400;
  color: var(--t3); border: none; background: none; font-family: inherit;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.15s; cursor: pointer; display: flex; align-items: center; gap: 5px;
}
.rp-tab:hover { color: var(--t2); }
.rp-tab.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.rp-tab .new-tag {
  font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--accent);
}

/* type tabs */
.rp-type { display: flex; padding: 10px 14px 8px; gap: 6px; flex-shrink: 0; }
.rp-type-btn {
  padding: 5px 13px; font-size: 12px; font-weight: 500;
  color: var(--t2); border: 1px solid var(--line); background: var(--bg);
  font-family: inherit; border-radius: 20px; transition: all 0.15s; cursor: pointer;
}
.rp-type-btn:hover { border-color: var(--lm); color: var(--t1); background: var(--bg1); }
.rp-type-btn.on {
  color: var(--accent); font-weight: 600;
  background: rgba(232,114,74,0.1); border-color: rgba(232,114,74,0.35);
}

/* upload modal */
.upload-modal-bg {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(58,31,13,0.35); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.upload-modal-bg.show { opacity: 1; pointer-events: all; }
.upload-modal {
  background: var(--surface); border-radius: 16px;
  border: 1px solid var(--lm);
  box-shadow: 0 20px 60px rgba(58,31,13,0.2);
  width: 420px; max-width: 92vw;
  overflow: hidden;
  transform: translateY(12px); transition: transform 0.2s;
}
.upload-modal-bg.show .upload-modal { transform: translateY(0); }
.um-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--line);
}
.um-header h3 { font-size: 15px; font-weight: 600; color: var(--t1); }
.um-close {
  width: 28px; height: 28px; border-radius: 6px;
  background: none; border: none; color: var(--t3);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.1s;
}
.um-close:hover { background: var(--bg1); color: var(--t2); }
.um-dropzone {
  margin: 16px 20px;
  border: 2px dashed var(--lm); border-radius: 12px;
  padding: 32px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; transition: all 0.15s; background: var(--bg);
  text-align: center;
}
.um-dropzone:hover, .um-dropzone.dragover {
  border-color: var(--accent); background: rgba(232,114,74,0.04);
}
.um-dropzone-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: rgba(232,114,74,0.1); border: 1px solid rgba(232,114,74,0.2);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
}
.um-dropzone-icon svg { width: 22px; height: 22px; }
.um-dropzone h4 { font-size: 13.5px; font-weight: 600; color: var(--t1); }
.um-dropzone p { font-size: 11.5px; color: var(--t3); }
.um-dropzone .um-browse {
  font-size: 12px; font-weight: 500; color: var(--accent);
  text-decoration: underline; cursor: pointer;
}
.um-file-input { display: none; }
.um-preview-list {
  max-height: 200px; overflow-y: auto;
  padding: 0 20px 4px;
  display: flex; flex-direction: column; gap: 8px;
}
.um-preview-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--line);
}
.um-preview-thumb {
  width: 40px; height: 40px; border-radius: 6px;
  object-fit: cover; flex-shrink: 0; background: var(--bg1);
}
.um-preview-name {
  flex: 1; font-size: 12px; color: var(--t1); font-weight: 400;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.um-preview-size { font-size: 11px; color: var(--t3); flex-shrink: 0; }
.um-preview-del {
  width: 24px; height: 24px; border-radius: 5px;
  background: none; border: none; color: var(--t3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all 0.1s; flex-shrink: 0;
}
.um-preview-del:hover { background: rgba(200,50,50,0.08); color: #C83232; }
.um-footer {
  display: flex; align-items: center; justify-content: flex-end; gap: 8px;
  padding: 12px 20px 16px; border-top: 1px solid var(--line);
}
.um-cancel {
  padding: 7px 16px; font-size: 13px; font-weight: 400;
  background: none; border: 1px solid var(--lm); border-radius: var(--r);
  color: var(--t2); cursor: pointer; transition: all 0.1s;
}
.um-cancel:hover { background: var(--bg1); color: var(--t1); }
.um-upload-btn {
  padding: 7px 18px; font-size: 13px; font-weight: 500;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--r); cursor: pointer; transition: all 0.15s;
}
.um-upload-btn:hover { background: var(--accent-h); }
.um-upload-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* delete overlay on saved items */
.gitem .del-btn {
  position: absolute; top: 5px; left: 5px; z-index: 4;
  width: 22px; height: 22px; border-radius: 5px;
  background: rgba(200,50,50,0.85); border: none; color: #fff;
  display: none; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; backdrop-filter: blur(4px);
}
.gitem:hover .del-btn { display: flex; }

/* video grid items */
.gitem.video-item::after {
  content: '▶';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.8); font-size: 18px;
  pointer-events: none;
}

/* gallery grid */
.gallery-grid {
  flex: 1; overflow-y: auto; padding: 0 14px 16px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  align-content: start;
  -ms-overflow-style: none; scrollbar-width: none;
}
.gallery-grid::-webkit-scrollbar { display: none; }

.gitem {
  border-radius: 8px; overflow: hidden; cursor: pointer;
  aspect-ratio: 1; position: relative;
  border: 1px solid var(--line);
  transition: transform 0.15s, border-color 0.15s;
  background: var(--bg1);
}
.gitem:hover { transform: scale(1.03); border-color: var(--lm); }
.gitem img, .gitem .gph { width: 100%; height: 100%; object-fit: cover; display: block; }
.gph { display: flex; align-items: center; justify-content: center; font-size: 22px; }

/* upload tile */
.gitem.upload {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; border: 1.5px dashed var(--lm);
  background: rgba(160,110,70,0.03);
}
.gitem.upload:hover { border-color: var(--accent); background: rgba(232,114,74,0.04); }
.upload-plus {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--bg1); border: 1px solid var(--lm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--t3);
}
.upload-label { font-size: 11px; font-weight: 500; color: var(--t2); text-align: center; }
.upload-sub { font-size: 9.5px; color: var(--t3); }

/* use overlay */
.gitem .use-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0); 
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 8px; opacity: 0; transition: all 0.15s;
}
.gitem:hover .use-overlay { opacity: 1; background: rgba(0,0,0,0.25); }
.use-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 11px; font-size: 11px; font-weight: 500;
  background: rgba(255,255,255,0.9); color: var(--t1);
  border: none; border-radius: 6px; backdrop-filter: blur(4px);
  transition: background 0.1s;
}
.use-btn:hover { background: #fff; }
.use-btn svg { width: 11px; height: 11px; }

/* unset overlay for non-image items */
.gitem.no-action .use-overlay { display: none; }

/* visibility icon top-right */
.gitem .vis-icon {
  position: absolute; top: 6px; right: 6px;
  width: 22px; height: 22px; border-radius: 5px;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  color: var(--t2);
}
.gitem .vis-icon svg { width: 12px; height: 12px; }

/* view more */
.rp-footer {
  padding: 12px 20px 16px; flex-shrink: 0;
  border-top: 1px solid var(--line);
}
.view-more {
  font-size: 13px; font-weight: 500; color: var(--accent);
  background: none; border: none; display: flex; align-items: center; gap: 5px;
  transition: opacity 0.15s;
}
.view-more:hover { opacity: 0.75; }

/* gallery bg colors */
.g1{background:linear-gradient(145deg,#1A0E08,#6A3820);}
.g2{background:linear-gradient(145deg,#0A1828,#305880);}
.g3{background:linear-gradient(145deg,#0A1A10,#205030);}
.g4{background:linear-gradient(145deg,#A09080,#C8B8A0);}
.g5{background:linear-gradient(145deg,#180808,#602020);}
.g6{background:linear-gradient(145deg,#B8A890,#D8C8A8);}

/* ══════════════════ AI CHAT ══════════════════ */
.chat-wrap {
  width: 100%; max-width: 760px;
  margin-top: 20px;
  display: flex; flex-direction: column; gap: 0;
}
.chat-messages {
  display: flex; flex-direction: column; gap: 12px;
  max-height: 340px; overflow-y: auto;
  padding: 4px 2px 8px;
  -ms-overflow-style: none; scrollbar-width: none;
}
.chat-messages::-webkit-scrollbar { display: none; }
.chat-messages:empty::before {
  content: 'AI 助手会在这里帮你优化创作 prompt…';
  font-size: 13px; color: var(--t3); font-style: italic;
  padding: 12px 0;
}
.msg {
  display: flex; gap: 10px; align-items: flex-start;
}
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.msg.ai .msg-avatar { background: rgba(232,114,74,0.12); color: var(--accent); }
.msg.user .msg-avatar { background: var(--bg1); color: var(--t2); }
.msg-bubble {

  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13.5px; line-height: 1.6; font-weight: 300;
}
.msg.ai .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--t1);
  border-top-left-radius: 4px;
}
.msg.user .msg-bubble {
  background: var(--accent);

  border-top-right-radius: 4px;
}
.chat-typing {
  display: none; align-items: center; gap: 6px;
  padding: 8px 0; font-size: 12px; color: var(--t3);
}
.chat-typing.show { display: flex; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--t3); animation: blink 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
.chat-use-prompt {
  font-size: 11.5px; color: var(--accent); font-weight: 500;

}

.chat-use-prompt.show { display: block; }

        <div class="gitem"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem"><img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem"><img src="https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem"><img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
      </div>

      <!-- LIBRARY E-COMMERCE grid -->
      <div class="gallery-grid" id="libEcommerce" style="display:none">
        <div class="gitem"><img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem"><img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem"><img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
      </div>

      <!-- LIBRARY SEEDANCE grid -->
      <div class="gallery-grid" id="libSeedance" style="display:none">
        <div class="gitem video-item"><img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem video-item"><img src="https://images.unsplash.com/photo-1518684079-3c830dcef090?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
        <div class="gitem video-item"><img src="https://images.unsplash.com/photo-1534796636912-3b584b0083c1?w=300&h=300&fit=crop&auto=format&q=80" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"><div class="use-overlay"><button class="use-btn">Use</button></div></div>
      </div>

      <div class="rp-footer">
        <button class="view-more">View more in Gallery →</button>
      </div>
    </div><!-- /rp-panel -->
  </div><!-- /sidebar-right -->

  <!-- UPLOAD MODAL -->
  <div class="upload-modal-bg" id="uploadModalBg">
    <div class="upload-modal">
      <div class="um-header">
        <h3>Upload Images</h3>
        <button class="um-close" id="umClose">×</button>
      </div>
      <div class="um-dropzone" id="umDropzone">
        <div class="um-dropzone-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <h4>Drop images here</h4>
        <p>or <span class="um-browse" id="umBrowse">browse files</span></p>
        <p>JPEG, PNG, WebP · Max 10MB each</p>
      </div>
      <input type="file" class="um-file-input" id="umFileInput" accept="image/*" multiple>
      <div class="um-preview-list" id="umPreviewList"></div>
      <div class="um-footer">
        <button class="um-cancel" id="umCancel">Cancel</button>
        <button class="um-upload-btn" id="umUploadBtn" disabled>Upload to Saved</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ── tab switching (nav + mode pills) ──
  document.querySelectorAll('.itab').forEach(t => t.onclick = function() {
    document.querySelectorAll('.itab').forEach(x => x.classList.remove('on'));
    this.classList.add('on');
  });
  document.querySelectorAll('.mode-pill').forEach(t => t.onclick = function() {
    document.querySelectorAll('.mode-pill').forEach(x => x.classList.remove('on'));
    this.classList.add('on');
  });
  document.querySelectorAll('.rp-tab').forEach(t => t.onclick = function() {
    document.querySelectorAll('.rp-tab').forEach(x => x.classList.remove('on'));
    this.classList.add('on');
  });
  document.querySelectorAll('.thumb').forEach(t => t.onclick = function() {
    document.querySelectorAll('.thumb').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
  });
  document.querySelectorAll('.back-btn, .logo').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      window.location.href = '/kaze-warm.html';
    });
  });

  // ── right panel toggle (Gmail style) ──
  const rightPanel     = document.getElementById('rightPanel');
  const galleryToggle  = document.getElementById('galleryToggle');
  const libraryToggle  = document.querySelector('.rp-strip-btn:last-child');
  const rpClose        = document.getElementById('rpClose');
  const rpTitle        = document.getElementById('rpTitle');
  const savedTabs      = document.getElementById('savedTabs');
  const libraryTabs    = document.getElementById('libraryTabs');
  const dragHandle     = document.getElementById('rpDragHandle');

  function showGrid(id) {
    ['savedImage','savedVideo','libTrending','libEcommerce','libSeedance'].forEach(gid => {
      const el = document.getElementById(gid);
      if (el) el.style.display = (gid === id) ? 'grid' : 'none';
    });
  }

  function openPanel(mode) {
    rightPanel.classList.add('open');
    if (mode === 'saved') {
      rpTitle.textContent = 'My Saved';
      savedTabs.style.display  = 'flex';
      libraryTabs.style.display = 'none';
      galleryToggle.classList.add('active');
      if (libraryToggle) libraryToggle.classList.remove('active');
      showGrid('savedImage');
    } else {
      rpTitle.textContent = 'Library';
      savedTabs.style.display  = 'none';
      libraryTabs.style.display = 'flex';
      if (libraryToggle) libraryToggle.classList.add('active');
      galleryToggle.classList.remove('active');
      showGrid('libTrending');
    }
  }

  if (galleryToggle) galleryToggle.addEventListener('click', () => openPanel('saved'));
  if (libraryToggle) libraryToggle.addEventListener('click',  () => openPanel('library'));
  if (rpClose) rpClose.addEventListener('click', () => rightPanel.classList.remove('open'));

  // ── sub-tab switching ──
  function setupTabs(groupEl) {
    if (!groupEl) return;
    groupEl.querySelectorAll('.rp-type-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        groupEl.querySelectorAll('.rp-type-btn').forEach(x => x.classList.remove('on'));
        this.classList.add('on');
        if (this.dataset.tab) showGrid(this.dataset.tab);
      });
    });
  }
  setupTabs(savedTabs);
  setupTabs(libraryTabs);

  // ── drag to resize ──
  let isDragging = false, startX, startW;
  const MIN_W = 240, MAX_W = 520;
  if (dragHandle) {
    dragHandle.addEventListener('mousedown', e => {
      if (!rightPanel.classList.contains('open')) return;
      isDragging = true;
      startX = e.clientX;
      startW = rightPanel.offsetWidth;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
  }
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const newW = Math.min(MAX_W, Math.max(MIN_W, startW + (startX - e.clientX)));
    rightPanel.style.width = newW + 'px';
    rightPanel.style.transition = 'none';
  });
  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    rightPanel.style.transition = '';
  });

  // ── upload modal ──
  const uploadModalBg  = document.getElementById('uploadModalBg');
  const uploadTile     = document.getElementById('uploadTile');
  const umClose        = document.getElementById('umClose');
  const umCancel       = document.getElementById('umCancel');
  const umDropzone     = document.getElementById('umDropzone');
  const umBrowse       = document.getElementById('umBrowse');
  const umFileInput    = document.getElementById('umFileInput');
  const umPreviewList  = document.getElementById('umPreviewList');
  const umUploadBtn    = document.getElementById('umUploadBtn');
  const savedImageGrid = document.getElementById('savedImage');

  let pendingFiles = [];

  function openUploadModal()  { uploadModalBg.classList.add('show'); pendingFiles = []; umPreviewList.innerHTML = ''; umUploadBtn.disabled = true; umFileInput.value = ''; }
  function closeUploadModal() { uploadModalBg.classList.remove('show'); }

  if (uploadTile)  uploadTile.addEventListener('click', openUploadModal);
  if (umClose)     umClose.addEventListener('click', closeUploadModal);
  if (umCancel)    umCancel.addEventListener('click', closeUploadModal);
  if (uploadModalBg) uploadModalBg.addEventListener('click', e => { if (e.target === uploadModalBg) closeUploadModal(); });
  if (umBrowse)    umBrowse.addEventListener('click', e => { e.stopPropagation(); umFileInput.click(); });
  if (umDropzone)  umDropzone.addEventListener('click', e => { if (e.target !== umBrowse) umFileInput.click(); });

  if (umDropzone) {
    umDropzone.addEventListener('dragover',  e => { e.preventDefault(); umDropzone.classList.add('dragover'); });
    umDropzone.addEventListener('dragleave', () => umDropzone.classList.remove('dragover'));
    umDropzone.addEventListener('drop', e => { e.preventDefault(); umDropzone.classList.remove('dragover'); handleFiles([...e.dataTransfer.files]); });
  }
  if (umFileInput) umFileInput.addEventListener('change', () => handleFiles([...umFileInput.files]));

  function formatSize(bytes) {
    if (bytes < 1024)    return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function handleFiles(files) {
    const images = files.filter(f => f.type.startsWith('image/') && f.size < 10 * 1024 * 1024);
    images.forEach(function(file) {
      pendingFiles.push(file);
      const reader = new FileReader();
      reader.onload = function(ev) {
        const item = document.createElement('div');
        item.className = 'um-preview-item';
        const img  = document.createElement('img');
        img.className = 'um-preview-thumb';
        img.src = ev.target.result;
        const name = document.createElement('span');
        name.className = 'um-preview-name';
        name.textContent = file.name;
        const size = document.createElement('span');
        size.className = 'um-preview-size';
        size.textContent = formatSize(file.size);
        const del = document.createElement('button');
        del.className = 'um-preview-del';
        del.textContent = '×';
        del.dataset.name = file.name;
        del.onclick = function() {
          pendingFiles = pendingFiles.filter(function(f) { return f.name !== del.dataset.name; });
          item.remove();
          umUploadBtn.disabled = pendingFiles.length === 0;
        };
        item.appendChild(img);
        item.appendChild(name);
        item.appendChild(size);
        item.appendChild(del);
        umPreviewList.appendChild(item);
      };
      reader.readAsDataURL(file);
    });
    umUploadBtn.disabled = pendingFiles.length === 0;
  }

  // localStorage storage (swap with Firebase later)
  var LOCAL_KEY = 'kaze_saved_images';

  function loadSavedImages() {
    var saved = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]');
    saved.forEach(function(img) { addImageToGrid(img.url, img.name, img.id); });
  }

  function addImageToGrid(url, name, id) {
    var tile = document.createElement('div');
    tile.className = 'gitem';
    tile.dataset.id = id;

    var img = document.createElement('img');
    img.src = url;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';

    var delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.title = 'Delete';
    delBtn.textContent = '×';
    delBtn.onclick = function(e) {
      e.stopPropagation();
      deleteImage(id);
      tile.remove();
    };

    var overlay = document.createElement('div');
    overlay.className = 'use-overlay';
    var useBtn = document.createElement('button');
    useBtn.className = 'use-btn';
    useBtn.textContent = 'Use';
    overlay.appendChild(useBtn);

    tile.appendChild(img);
    tile.appendChild(delBtn);
    tile.appendChild(overlay);

    var uploadTileEl = document.getElementById('uploadTile');
    if (uploadTileEl) savedImageGrid.insertBefore(tile, uploadTileEl);
    else savedImageGrid.appendChild(tile);
  }

  function deleteImage(id) {
    // remove from localStorage index
    var saved = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]');
    localStorage.setItem(LOCAL_KEY, JSON.stringify(saved.filter(function(i) { return i.id !== id; })));
    // Note: Cloudinary deletion requires server-side API call (needs API secret)
    // Image stays in Cloudinary storage but is removed from the UI and local index
  }

  // ── Cloudinary upload ──
  var CLOUD_NAME    = 'dft5p7iay';
  var UPLOAD_PRESET = 'vibecoding0422';

  async function uploadToCloudinary(file) {
    var formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('folder', 'kaze-saved');
    var res  = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload', {
      method: 'POST', body: formData
    });
    var data = await res.json();
    if (data.secure_url) return { url: data.secure_url, publicId: data.public_id };
    throw new Error(data.error && data.error.message || 'Upload failed');
  }

  if (umUploadBtn) {
    umUploadBtn.addEventListener('click', async function() {
      umUploadBtn.disabled = true;
      umUploadBtn.textContent = 'Uploading…';

      var saved = JSON.parse(localStorage.getItem(LOCAL_KEY) || '[]');
      var total = pendingFiles.length;
      var done  = 0;

      for (var i = 0; i < pendingFiles.length; i++) {
        var file = pendingFiles[i];
        var id   = Date.now() + '_' + Math.random().toString(36).slice(2);
        var url  = '';
        var publicId = '';

        try {
          var result = await uploadToCloudinary(file);
          url      = result.url;
          publicId = result.publicId;
          console.log('Cloudinary upload OK:', url);
        } catch(e) {
          console.warn('Cloudinary failed, using localStorage', e);
          url = await readAsDataURL(file);
        }

        var entry = { id: id, url: url, name: file.name, publicId: publicId };
        saved.push(entry);
        addImageToGrid(url, file.name, id);
        done++;

        if (done === total) {
          localStorage.setItem(LOCAL_KEY, JSON.stringify(saved));
          umUploadBtn.textContent = 'Upload to Saved';
          umUploadBtn.disabled = false;
          closeUploadModal();
        }
      }
    });
  }

  function readAsDataURL(file) {
    return new Promise(function(resolve) {
      var r = new FileReader();
      r.onload = function(e) { resolve(e.target.result); };
      r.readAsDataURL(file);
    });
  }

  loadSavedImages();

  // ── AI chat ──
  const chatFeed   = document.getElementById('chatMessages');
  const chatEmpty  = document.getElementById('chatEmpty');
  const chatTyping = document.getElementById('chatTyping');
  const textarea   = document.querySelector('textarea');
  const goBtn      = document.querySelector('.go');
  var conversationHistory = [];

  function addMessage(role, text) {
    if (chatEmpty) chatEmpty.style.display = 'none';
    var wrap   = document.createElement('div');
    wrap.className = 'msg ' + role;
    var avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'ai' ? '✦' : '我';
    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatFeed.appendChild(wrap);
    chatFeed.scrollTop = chatFeed.scrollHeight;
  }

  async function sendToAI(userText) {
    conversationHistory.push({ role: 'user', content: userText });
    chatTyping.classList.add('show');
    try {
      var res  = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: conversationHistory }) });
      var data = await res.json();
      var reply = data.reply || '抱歉，出错了，请重试。';
      conversationHistory.push({ role: 'assistant', content: reply });
      chatTyping.classList.remove('show');
      addMessage('ai', reply);
    } catch(err) {
      chatTyping.classList.remove('show');
      addMessage('ai', '网络错误，请检查连接后重试。');
    }
  }

  var params = new URLSearchParams(window.location.search);
  var initPrompt = params.get('prompt');
  if (initPrompt && textarea) {
    textarea.value = initPrompt;
    addMessage('user', initPrompt);
    sendToAI('我想创作：' + initPrompt + '，请帮我优化这个 prompt，让 AI 图片生成效果更好，给出 2-3 个方向。');
  }

  if (goBtn) {
    goBtn.addEventListener('click', function() {
      var text = textarea.value.trim();
      if (!text) return;
      addMessage('user', text);
      sendToAI(text);
      textarea.value = '';
    });
  }

  if (textarea) {
    textarea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (goBtn) goBtn.click(); }
    });
  }
</script>
</body>
</html>
